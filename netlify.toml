[build]
  command = "npm run build"
  publish = "dist"

[context.main]
  branch = "main"
  publish = "dist"

[context.main.environment]
  VITE_ENABLE_MOD4 = "true"
  VITE_ENABLE_MAPLIBRE_MAPS = "true"
  VITE_VEHICLE_CONSOLIDATION = "true"
  VITE_ENABLE_INTELLIGENCE = "true"
  VITE_ENABLE_ANALYTICS = "true"

# Let missing assets return 404 instead of serving index.html.
# No force=true: Netlify serves existing files first; this rule only fires for missing paths,
# preventing the SPA fallback from serving index.html as a JS module.
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 404

# SPA fallback - route all requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(self), microphone=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co https://basemaps.cartocdn.com https://tiles.openfreemap.org; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://tiles.openfreemap.org; worker-src 'self' blob:; child-src 'self' blob:; frame-src 'none'"

# Prevent caching index.html so deploys take effect immediately
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache static assets (Vite uses content-hashed filenames, so immutable is safe)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
