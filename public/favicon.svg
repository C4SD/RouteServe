<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="rs-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#rs-grad)"/>
  <!-- Route path: two dots connected by a curved line -->
  <circle cx="9" cy="22" r="2.5" fill="white"/>
  <circle cx="23" cy="10" r="2.5" fill="white"/>
  <path d="M9 22 C9 14, 23 18, 23 10" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Arrow head at destination -->
  <polyline points="20,8 23,10 21,13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
